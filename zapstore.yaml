identifier: org.fedimint.app
name: Ecash App
summary: A free and open source Fedimint wallet
description: |
  Ecash App is a free and open source Fedimint wallet that puts financial
  privacy first. Manage your ecash across multiple federations with support
  for Lightning, on-chain, and ecash payments.

  Features:
  - Discover and join Fedimint federations
  - Send and receive over Lightning Network
  - Claim a Lightning Address for easy payments
  - Nostr Wallet Connect (NWC) for app integrations
  - Nostr-based contacts
  - Federation monitoring and gateway selection
  - Automated backup and recovery via Nostr
repository: https://github.com/fedimint/ecash-app
homepage: https://ecash.love
